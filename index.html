<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fireworks Hand WebAR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="camera" playsinline muted></video>
  <canvas id="threeCanvas"></canvas>

  <div id="ui">
    <div class="panel">
      <h1>Fireworks Hand WebAR</h1>
      <p id="guide">開始ボタンを押して、カメラを許可してください。手のひらをカメラに向けると花火が表示されます。</p>
      <div class="row">
        <button id="startBtn">開始</button>
        <button id="fireBtn" disabled>花火開始</button>
        <button id="soundBtn" disabled>音 ON</button>
      </div>
      <label class="label">表示文字</label>
      <div class="row">
        <input id="textInput" value="祝 AR体験" maxlength="20" />
        <button id="applyTextBtn" disabled>変更</button>
      </div>
      <div id="status">待機中</div>
    </div>
  </div>

  <div id="hiddenTextCanvasWrap">
    <canvas id="textCanvas" width="768" height="256"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
